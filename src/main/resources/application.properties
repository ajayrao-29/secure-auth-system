spring.application.name=secure-auth-system

server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/secure_auth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:change_me}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

security.jwt.secret=${JWT_SECRET:VGhpc0lzQVN0YXJ0ZXJCYXNlNjRTZWNyZXRLZXlGb3JEZXZPbmx5MDEyMzQ1Njc4OTA=}
security.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
security.jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
security.rate-limit.capacity=${RATE_LIMIT_CAPACITY:20}
security.rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:60}

logging.level.root=INFO
logging.level.com.secureauth.system=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

management.endpoints.web.exposure.include=health,info

app.bootstrap-admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap-admin.username=${BOOTSTRAP_ADMIN_USERNAME:}
app.bootstrap-admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap-admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
